name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

env:
  CMAJOR_VERSION: "1.0.3159"

jobs:
  static-checks:
    name: Static checks (preflight, manifests, UI syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preflight every example (strict)
        run: |
          set -e
          for d in examples/*/; do
            echo "── $d ──"
            python3 tools/preflight.py "$d" --strict
          done

      - name: Validate every manifest (strict)
        run: |
          set -e
          for d in examples/*/; do
            python3 tools/manifest_check.py "$d" --strict
          done

      - name: Scaffolder smoke test (all three types)
        run: |
          set -e
          for t in fx instrument midi; do
            python3 tools/new_plugin.py --type "$t" --name "CI $t" --out "/tmp/CI_$t" --force
            python3 tools/preflight.py "/tmp/CI_$t" --strict
          done

      - name: UI files are valid ES modules
        run: |
          set -e
          for f in examples/*/*UI.js /tmp/CI_*/*UI.js; do
            node --check "$f"
            echo "✓ $f"
          done

  compile-checks:
    name: Compile with the real cmaj compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download cmaj ${{ env.CMAJOR_VERSION }}
        run: |
          curl -sLO "https://github.com/cmajor-lang/cmajor/releases/download/${CMAJOR_VERSION}/cmajor.linux.x64.zip"
          unzip -q cmajor.linux.x64.zip -d cmaj-bin
          chmod +x cmaj-bin/linux/x64/cmaj

      - name: Make cmaj run headless (stub GUI libs)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libsoup2.4-1 libjack-jackd2-0
          # The compile path never calls WebKit; stub the sonames it links.
          readelf --dyn-syms -W cmaj-bin/linux/x64/cmaj \
            | awk '$7=="UND"{print $8}' \
            | grep -E '^(webkit_|jsc_|soup_)' | sort -u \
            | sed 's/.*/void* &(void){return 0;}/' > stub.c
          gcc -shared -fPIC -o stub_webkit.so stub.c
          sudo cp stub_webkit.so /usr/lib/x86_64-linux-gnu/libwebkit2gtk-4.0.so.37
          sudo cp stub_webkit.so /usr/lib/x86_64-linux-gnu/libjavascriptcoregtk-4.0.so.18
          sudo ldconfig
          cmaj-bin/linux/x64/cmaj version

      - name: Compile every example patch
        run: |
          set -e
          for p in examples/*/*.cmajorpatch; do
            echo "── $p ──"
            cmaj-bin/linux/x64/cmaj generate --target=cpp --output=/dev/null "$p"
          done

      - name: Compile scaffolder output (all three types)
        run: |
          set -e
          for t in fx instrument midi; do
            python3 tools/new_plugin.py --type "$t" --name "CI $t" --out "/tmp/CC_$t" --force
            cmaj-bin/linux/x64/cmaj generate --target=cpp --output=/dev/null /tmp/CC_$t/*.cmajorpatch
          done

      - name: Run the cookbook unit tests
        run: |
          cmaj-bin/linux/x64/cmaj test tests/
